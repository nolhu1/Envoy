version: "3"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: envoy
      POSTGRES_PASSWORD: envoy
      POSTGRES_DB: envoy
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U envoy -d envoy"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
